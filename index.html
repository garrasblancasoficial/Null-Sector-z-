<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NULL SECTOR 7 - Menú Principal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #87CEEB;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease;
        }

        .splash-content {
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        .game-title {
            font-size: 4rem;
            letter-spacing: 6px;
            color: #e6e6e6;
            text-shadow: 0 0 30px rgba(200, 100, 50, 0.8);
            font-weight: 300;
            margin-bottom: 15px;
        }

        .title-underline {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c86432, #e68a4a, #c86432, transparent);
            margin: 0 auto 30px auto;
        }

        .loading-bar-container {
            width: 320px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 25px auto;
            overflow: hidden;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #c86432, #e68a4a);
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .loading-text {
            color: #aaa;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .version-text {
            color: #555;
            font-size: 0.7rem;
            margin-top: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease;
            visibility: hidden;
        }

        #menu-container.visible {
            opacity: 1;
            visibility: visible;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
        }

        .menu-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        .menu-logo h1 {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #c86432 50%, #8b3a1a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(200, 100, 50, 0.4);
            margin-bottom: 20px;
        }

        .glow-effect {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c86432, #e68a4a, #c86432, transparent);
            margin: 0 auto;
        }

        .menu-buttons {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 280px;
        }

        .menu-btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 100, 50, 0.5);
            color: #e6e6e6;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 8px;
            font-family: inherit;
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, rgba(200, 100, 50, 0.8), rgba(139, 58, 26, 0.8));
            border-color: #e68a4a;
            box-shadow: 0 0 15px rgba(200, 100, 50, 0.3);
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            border-color: #e68a4a;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 5px 20px rgba(200, 100, 50, 0.2);
        }

        .menu-footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            letter-spacing: 1px;
            z-index: 3;
        }

        .zombie-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            color: #ff6666;
            font-family: monospace;
            font-size: 1.2rem;
            z-index: 10;
            border-left: 3px solid #ff4444;
            font-weight: bold;
        }

        .spawn-timer {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #ffaa66;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 10;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal.visible {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid #c86432;
            border-radius: 16px;
            padding: 30px;
            min-width: 320px;
            text-align: center;
        }

        .modal-content h2 {
            color: #e68a4a;
            margin-bottom: 25px;
        }

        .modal-close {
            background: linear-gradient(135deg, #c86432, #8b3a1a);
            border: none;
            color: white;
            padding: 10px 25px;
            margin-top: 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .option-slider {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="game-title">NULL SECTOR 7</h1>
            <div class="title-underline"></div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <p class="loading-text" id="loading-text">Inicializando sistema...</p>
            <p class="version-text">v1.0.0</p>
        </div>
    </div>

    <div id="menu-container">
        <div id="canvas-container"></div>
        <div class="menu-overlay"></div>
        <div class="menu-content">
            <div class="menu-logo">
                <h1>NULL SECTOR 7</h1>
                <div class="glow-effect"></div>
            </div>
            <div class="menu-buttons">
                <button class="menu-btn primary" id="btn-nueva-partida">▶ NUEVA PARTIDA</button>
                <button class="menu-btn" id="btn-cargar-partida">📁 CARGAR PARTIDA</button>
                <button class="menu-btn" id="btn-opciones">⚙️ OPCIONES</button>
                <button class="menu-btn" id="btn-salir">✖ SALIR</button>
            </div>
            <div class="menu-footer">
                <p>© 2026 NULL SECTOR 7 - SUPERVIVENCIA | LOS ZOMBIES LLEGAN CADA VEZ MÁS RÁPIDO</p>
            </div>
        </div>
        <div class="zombie-counter" id="zombie-counter">🧟 ZOMBIES: 0</div>
        <div class="spawn-timer" id="spawn-timer">⏱️ PRÓXIMO ZOMBIE: --s</div>
    </div>

    <div id="modal-opciones" class="modal">
        <div class="modal-content">
            <h2>OPCIONES</h2>
            <div class="option-slider">
                <label>Volumen</label>
                <input type="range" id="opt-volumen" min="0" max="100" value="50">
            </div>
            <button class="modal-close" id="close-opciones">CERRAR</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================
        // NULL SECTOR 7 - VECINDARIO CON ZOMBIES INFINITOS
        // Casas grandes, humanos con armas, más zombies cada vez
        // CORREGIDO: SPAWN DE ZOMBIES FUNCIONAL
        // ============================================
        
        const COLORS = {
            humanoPiel: [0xf5d0a9, 0xe0b87a],
            zombiePiel: [0x6b4c3b, 0x5a3e2e, 0x4a6b3b],
            humanoRopa: [0x4a6b3b, 0x2c3e2e, 0x8b5a2b],
            zombieRopa: [0x2a3a2a, 0x1a2a1a]
        };
        
        let scene, camera, renderer;
        let npcs = [];
        let bullets = [];
        let houses = [];
        let trees = [];
        let audioContext;
        
        // Variables para spawn de zombies
        let lastSpawnTime = 0;
        let currentSpawnInterval = 12; // segundos entre spawns (empieza en 12s)
        let gameStartTime = 0;
        
        class NPC {
            constructor(group, isZombie, x, z) {
                this.group = group;
                this.isZombie = isZombie;
                this.x = x;
                this.z = z;
                this.targetX = x;
                this.targetZ = z;
                this.speed = isZombie ? 0.9 : 1.3;
                this.shootCooldown = 0;
                this.health = isZombie ? 50 : 100;
                this.group.position.set(x, 0, z);
            }
            
            update(delta, time) {
                // Movimiento libre: cambiar objetivo aleatoriamente
                if (Math.random() < 0.02 * (delta * 60)) {
                    this.targetX = this.x + (Math.random() - 0.5) * 7;
                    this.targetZ = this.z + (Math.random() - 0.5) * 7;
                    this.targetX = Math.max(-18, Math.min(18, this.targetX));
                    this.targetZ = Math.max(-18, Math.min(18, this.targetZ));
                }
                
                let dx = this.targetX - this.x;
                let dz = this.targetZ - this.z;
                let dist = Math.sqrt(dx*dx + dz*dz);
                if (dist > 0.3) {
                    let move = Math.min(this.speed * delta, dist);
                    this.x += (dx / dist) * move;
                    this.z += (dz / dist) * move;
                    this.group.position.set(this.x, Math.sin(time * 3) * 0.03, this.z);
                    let angle = Math.atan2(dx, dz);
                    this.group.rotation.y = angle;
                }
                
                // Brazos animados
                let leftArm = this.group.children.find(c => c.position.x === -0.5);
                let rightArm = this.group.children.find(c => c.position.x === 0.5);
                if (leftArm) leftArm.rotation.z = Math.sin(time * 5) * 0.3;
                if (rightArm) rightArm.rotation.z = -Math.sin(time * 5) * 0.3;
                
                // Humanos disparan a zombies
                if (!this.isZombie && this.shootCooldown <= 0) {
                    let nearestZombie = null;
                    let nearestDist = 8;
                    for (let npc of npcs) {
                        if (npc.isZombie && npc.health > 0) {
                            let d = Math.hypot(this.x - npc.x, this.z - npc.z);
                            if (d < nearestDist) {
                                nearestDist = d;
                                nearestZombie = npc;
                            }
                        }
                    }
                    if (nearestZombie && nearestDist < 6) {
                        this.shoot(nearestZombie);
                        this.shootCooldown = 25;
                    }
                }
                if (this.shootCooldown > 0) this.shootCooldown -= delta * 60;
            }
            
            shoot(target) {
                let flash = new THREE.PointLight(0xff6600, 1, 3);
                flash.position.copy(this.group.position);
                flash.position.y = 0.8;
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 100);
                
                let bullet = {
                    pos: { x: this.x, z: this.z, y: 0.6 },
                    target: target,
                    life: 60
                };
                bullets.push(bullet);
                
                if (audioContext && audioContext.state === 'running') {
                    let osc = audioContext.createOscillator();
                    let gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 800;
                    gain.gain.value = 0.3;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                    osc.stop(audioContext.currentTime + 0.3);
                }
            }
            
            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    scene.remove(this.group);
                    return true;
                }
                return false;
            }
        }
        
        function crearPersonaje3D(x, z, esZombie) {
            const grupo = new THREE.Group();
            
            const colorPiel = esZombie 
                ? COLORS.zombiePiel[Math.floor(Math.random() * COLORS.zombiePiel.length)]
                : COLORS.humanoPiel[Math.floor(Math.random() * COLORS.humanoPiel.length)];
            const colorRopa = esZombie
                ? COLORS.zombieRopa[Math.floor(Math.random() * COLORS.zombieRopa.length)]
                : COLORS.humanoRopa[Math.floor(Math.random() * COLORS.humanoRopa.length)];
            
            // Cuerpo
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.4), new THREE.MeshStandardMaterial({ color: colorRopa }));
            torso.position.y = 0.45;
            torso.castShadow = true;
            grupo.add(torso);
            
            // Cabeza
            const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({ color: colorPiel }));
            cabeza.position.y = 1.0;
            cabeza.castShadow = true;
            grupo.add(cabeza);
            
            // Ojos
            const ojoBlanco = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            ojoBlanco.position.set(-0.14, 1.08, 0.41);
            grupo.add(ojoBlanco);
            const ojoBlanco2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            ojoBlanco2.position.set(0.14, 1.08, 0.41);
            grupo.add(ojoBlanco2);
            
            // Pupilas
            const pupila = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshStandardMaterial({ color: esZombie ? 0xff3333 : 0x2c3e2e }));
            pupila.position.set(-0.14, 1.07, 0.5);
            grupo.add(pupila);
            const pupila2 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshStandardMaterial({ color: esZombie ? 0xff3333 : 0x2c3e2e }));
            pupila2.position.set(0.14, 1.07, 0.5);
            grupo.add(pupila2);
            
            // Boca
            const boca = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.07, 0.07), new THREE.MeshStandardMaterial({ color: esZombie ? 0x8b3a1a : 0x5a3a2a }));
            boca.position.set(0, 0.92, 0.42);
            grupo.add(boca);
            
            // Arma para humanos
            if (!esZombie) {
                const arma = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                arma.position.set(0.55, 0.85, 0.25);
                arma.rotation.z = -0.3;
                arma.castShadow = true;
                grupo.add(arma);
                
                const cañon = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                cañon.position.set(0.8, 0.85, 0.3);
                cañon.rotation.x = Math.PI / 2;
                grupo.add(cañon);
            }
            
            // Brazos
            const brazoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.25), new THREE.MeshStandardMaterial({ color: colorRopa }));
            brazoIzq.position.set(-0.5, 0.8, 0);
            brazoIzq.castShadow = true;
            grupo.add(brazoIzq);
            const brazoDer = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.25), new THREE.MeshStandardMaterial({ color: colorRopa }));
            brazoDer.position.set(0.5, 0.8, 0);
            brazoDer.castShadow = true;
            grupo.add(brazoDer);
            
            // Piernas
            const piernaIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.3), new THREE.MeshStandardMaterial({ color: colorRopa }));
            piernaIzq.position.set(-0.25, 0.25, 0);
            piernaIzq.castShadow = true;
            grupo.add(piernaIzq);
            const piernaDer = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.3), new THREE.MeshStandardMaterial({ color: colorRopa }));
            piernaDer.position.set(0.25, 0.25, 0);
            piernaDer.castShadow = true;
            grupo.add(piernaDer);
            
            grupo.position.set(x, 0, z);
            grupo.castShadow = true;
            grupo.receiveShadow = true;
            return grupo;
        }
        
        function crearCasaGrande(x, z) {
            const grupo = new THREE.Group();
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(3.2, 2.2, 3.2), new THREE.MeshStandardMaterial({ color: 0xc9b6a0, roughness: 0.6 }));
            base.position.y = 1.1;
            base.castShadow = true;
            base.receiveShadow = true;
            grupo.add(base);
            
            const techo = new THREE.Mesh(new THREE.ConeGeometry(2.2, 1.4, 4), new THREE.MeshStandardMaterial({ color: 0xb85c1a, roughness: 0.8 }));
            techo.position.y = 2.3;
            techo.castShadow = true;
            grupo.add(techo);
            
            const puerta = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
            puerta.position.set(0, 0.7, 1.61);
            grupo.add(puerta);
            
            const ventana = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.1), new THREE.MeshStandardMaterial({ color: 0x87CEEB }));
            ventana.position.set(-1.1, 1.2, 1.61);
            grupo.add(ventana);
            const ventana2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.1), new THREE.MeshStandardMaterial({ color: 0x87CEEB }));
            ventana2.position.set(1.1, 1.2, 1.61);
            grupo.add(ventana2);
            
            grupo.position.set(x, 0, z);
            return grupo;
        }
        
        function crearArbol(x, z) {
            const grupo = new THREE.Group();
            const tronco = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.5, 6), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
            tronco.position.y = 0.75;
            tronco.castShadow = true;
            grupo.add(tronco);
            const copa = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), new THREE.MeshStandardMaterial({ color: 0x5a8f4c }));
            copa.position.y = 1.5;
            copa.castShadow = true;
            grupo.add(copa);
            grupo.position.set(x, 0, z);
            return grupo;
        }
        
        function spawnNuevoZombie() {
            // Aparecer en los bordes
            let side = Math.floor(Math.random() * 4);
            let x, z;
            let range = 19;
            if (side === 0) { x = -range; z = (Math.random() - 0.5) * range * 1.4; }
            else if (side === 1) { x = range; z = (Math.random() - 0.5) * range * 1.4; }
            else if (side === 2) { x = (Math.random() - 0.5) * range * 1.4; z = -range; }
            else { x = (Math.random() - 0.5) * range * 1.4; z = range; }
            
            let grupo = crearPersonaje3D(x, z, true);
            scene.add(grupo);
            let newZombie = new NPC(grupo, true, x, z);
            npcs.push(newZombie);
            
            updateZombieCounter();
            
            // Efecto visual de aparición
            console.log(`🧟 Nuevo zombie apareció en (${x.toFixed(1)}, ${z.toFixed(1)})`);
        }
        
        function updateZombieCounter() {
            const zombieCount = npcs.filter(n => n.isZombie && n.health > 0).length;
            const counter = document.getElementById('zombie-counter');
            if (counter) counter.innerHTML = `🧟 ZOMBIES: ${zombieCount}`;
        }
        
        function updateSpawnTimer(secondsLeft) {
            const timerEl = document.getElementById('spawn-timer');
            if (timerEl) {
                timerEl.innerHTML = `⏱️ PRÓXIMO ZOMBIE: ${secondsLeft.toFixed(1)}s`;
            }
        }
        
        function iniciarEscena() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 70);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(10, 8, 15);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Luz solar
            const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
            sunLight.position.set(12, 18, 6);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
            scene.add(sunLight);
            
            const ambientLight = new THREE.AmbientLight(0x88aaff, 0.6);
            scene.add(ambientLight);
            
            // Suelo
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(45, 45),
                new THREE.MeshStandardMaterial({ color: 0x5c9e4a, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.15;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Calles
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
            for (let i = -16; i <= 16; i += 5) {
                const calle = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 40), roadMat);
                calle.rotation.x = -Math.PI / 2;
                calle.position.set(i, -0.08, 0);
                calle.receiveShadow = true;
                scene.add(calle);
                const calle2 = new THREE.Mesh(new THREE.PlaneGeometry(40, 2.5), roadMat);
                calle2.rotation.x = -Math.PI / 2;
                calle2.position.set(0, -0.08, i);
                calle2.receiveShadow = true;
                scene.add(calle2);
            }
            
            // Casas
            const housePositions = [
                [-6, -6], [6, -6], [-6, 6], [6, 6],
                [-9, -9], [9, -9], [-9, 9], [9, 9],
                [0, -11], [0, 11], [-11, 0], [11, 0],
                [-13, -4], [13, -4], [-13, 4], [13, 4]
            ];
            housePositions.forEach(pos => {
                const casa = crearCasaGrande(pos[0], pos[1]);
                scene.add(casa);
                houses.push(casa);
            });
            
            // Árboles
            for (let i = 0; i < 70; i++) {
                let x = (Math.random() - 0.5) * 36;
                let z = (Math.random() - 0.5) * 36;
                if (Math.abs(x) < 13 && Math.abs(z) < 13) continue;
                const arbol = crearArbol(x, z);
                scene.add(arbol);
                trees.push(arbol);
            }
            
            // Crear humanos
            for (let i = 0; i < 8; i++) {
                let x = (Math.random() - 0.5) * 14;
                let z = (Math.random() - 0.5) * 14;
                let grupo = crearPersonaje3D(x, z, false);
                scene.add(grupo);
                npcs.push(new NPC(grupo, false, x, z));
            }
            
            // Crear zombies iniciales
            for (let i = 0; i < 8; i++) {
                let x = (Math.random() - 0.5) * 18;
                let z = (Math.random() - 0.5) * 18;
                let grupo = crearPersonaje3D(x, z, true);
                scene.add(grupo);
                npcs.push(new NPC(grupo, true, x, z));
            }
            
            updateZombieCounter();
            
            let time = 0;
            let lastTime = performance.now();
            gameStartTime = performance.now() / 1000;
            lastSpawnTime = gameStartTime;
            
            function animate() {
                let now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                time += delta;
                
                let currentGameTime = performance.now() / 1000;
                let timeSinceLastSpawn = currentGameTime - lastSpawnTime;
                
                // Mostrar tiempo para próximo spawn
                let timeLeft = Math.max(0, currentSpawnInterval - timeSinceLastSpawn);
                updateSpawnTimer(timeLeft);
                
                // SPAWN DE ZOMBIES - CORREGIDO
                if (timeSinceLastSpawn >= currentSpawnInterval) {
                    lastSpawnTime = currentGameTime;
                    spawnNuevoZombie();
                    
                    // Reducir intervalo gradualmente (más zombies con el tiempo)
                    if (currentSpawnInterval > 4) {
                        currentSpawnInterval -= 0.15;
                        console.log(`⚡ Intervalo de spawn reducido a ${currentSpawnInterval.toFixed(1)}s`);
                    }
                }
                
                // Actualizar NPCs
                for (let i = npcs.length-1; i >= 0; i--) {
                    let npc = npcs[i];
                    npc.update(delta, time);
                    if (npc.health <= 0) {
                        scene.remove(npc.group);
                        npcs.splice(i,1);
                        updateZombieCounter();
                    }
                }
                
                // Actualizar balas
                for (let i = bullets.length-1; i >= 0; i--) {
                    let b = bullets[i];
                    b.life -= delta * 60;
                    if (b.life <= 0 || !b.target || b.target.health <= 0) {
                        bullets.splice(i,1);
                        continue;
                    }
                    let dx = b.target.x - b.pos.x;
                    let dz = b.target.z - b.pos.z;
                    let dist = Math.hypot(dx, dz);
                    if (dist < 0.6) {
                        let died = b.target.takeDamage(30);
                        if (died) updateZombieCounter();
                        bullets.splice(i,1);
                    } else {
                        b.pos.x += (dx / dist) * 6 * delta;
                        b.pos.z += (dz / dist) * 6 * delta;
                        let bulletMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshStandardMaterial({ color: 0xffaa66 }));
                        bulletMesh.position.set(b.pos.x, 0.55, b.pos.z);
                        scene.add(bulletMesh);
                        setTimeout(() => scene.remove(bulletMesh), 40);
                    }
                }
                
                // Cámara
                let camX = Math.sin(time * 0.08) * 9;
                let camZ = 14 + Math.cos(time * 0.12) * 3;
                camera.position.x = camX;
                camera.position.z = camZ;
                camera.position.y = 7 + Math.sin(time * 0.2) * 0.5;
                camera.lookAt(0, 1.5, 0);
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        function iniciarAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            document.body.addEventListener('click', () => {
                if (audioContext.state === 'suspended') audioContext.resume();
            }, { once: true });
        }
        
        function simularCarga() {
            const loadingBar = document.getElementById('loading-bar');
            const loadingText = document.getElementById('loading-text');
            let progreso = 0;
            const intervalo = setInterval(() => {
                progreso += Math.random() * 15;
                if (progreso >= 100) {
                    progreso = 100;
                    clearInterval(intervalo);
                    loadingText.textContent = '¡Listo!';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('splash-screen').style.display = 'none';
                            document.getElementById('menu-container').classList.add('visible');
                            iniciarEscena();
                            iniciarAudio();
                        }, 1000);
                    }, 500);
                }
                loadingBar.style.width = Math.min(progreso, 100) + '%';
                if (progreso < 30) loadingText.textContent = 'Cargando vecindario...';
                else if (progreso < 60) loadingText.textContent = 'Desplegando defensores...';
                else loadingText.textContent = 'Los zombies se acercan...';
            }, 150);
        }
        
        function configurarEventos() {
            document.getElementById('btn-nueva-partida').onclick = () => {
                window.dispatchEvent(new CustomEvent('ns7:nueva-partida'));
            };
            document.getElementById('btn-cargar-partida').onclick = () => {
                alert('Función de carga disponible pronto');
            };
            document.getElementById('btn-opciones').onclick = () => {
                document.getElementById('modal-opciones').classList.add('visible');
            };
            document.getElementById('btn-salir').onclick = () => {
                if (confirm('¿Salir del juego?')) window.close();
            };
            document.getElementById('close-opciones').onclick = () => {
                document.getElementById('modal-opciones').classList.remove('visible');
            };
        }
        
        simularCarga();
        configurarEventos();
        
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
